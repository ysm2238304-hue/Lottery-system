<!DOCTYPE html>
<html lang="zh-TW" class="dark h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極光智慧抽獎系統 - 安全專業錄影版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f3ff', 100: '#e1e7ff', 200: '#cbd5ff', 300: '#a3b4ff', 400: '#7a8bff', 500: '#4f5eff', 600: '#3b40ff', 700: '#2c2aff', 800: '#2521cc', 900: '#2220a3' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        * { font-family: 'Noto Sans TC', sans-serif; box-sizing: border-box; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .aurora-bg { background: radial-gradient(circle at 50% -20%, #1e1b4b, #0f172a, #020617); position: relative; }
        /* 裝飾性極光漸變球 */
        .glow-blob { position: absolute; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); z-index: 0; opacity: 0.12; pointer-events: none; }
        .blob-1 { top: -100px; left: -100px; background: #4f5eff; }
        .blob-2 { bottom: -100px; right: -100px; background: #10b981; }
        .marquee-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .winner-card { border: 2px solid #f59e0b; background: linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0%, rgba(217, 119, 6, 0.15) 100%); animation: prize-glow 2s infinite alternate; }
        @keyframes prize-glow { from { box-shadow: 0 0 10px rgba(245,158,11,0.2); } to { box-shadow: 0 0 35px rgba(245,158,11,0.5); } }
    </style>
</head>
<body class="aurora-bg text-slate-100 min-h-full overflow-hidden">
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <!-- Toast 訊息容器 -->
    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="relative z-10 max-w-[1700px] mx-auto p-6 lg:p-10 flex flex-col h-screen">
        <!-- 頁首區塊 -->
        <header class="flex items-center justify-between mb-8 border-b border-slate-800/80 pb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-brand-500 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider">極光智慧抽獎安全專業版</h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <!-- 錄影授權狀態指示燈 -->
                <button id="record-auth-btn" onclick="authorizeRecording()" class="px-4 py-2 rounded-xl bg-rose-500/10 border border-rose-500/30 flex items-center gap-2 text-xs font-bold text-rose-400 hover:bg-rose-500/20 transition-all">
                    <span id="record-dot" class="w-2 h-2 rounded-full bg-rose-500"></span> <span id="record-text">點此授權錄影功能</span>
                </button>
                <div id="conn-status" class="px-4 py-2 rounded-xl bg-slate-900/50 border border-slate-800 flex items-center gap-2 text-xs font-bold text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-slate-500"></span> 離線模式
                </div>
                <button onclick="toggleModal('settings-modal')" class="p-2.5 bg-slate-800 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- 經典三分欄 -->
        <main class="grid grid-cols-12 gap-8 flex-1 min-h-0">
            <!-- 左側分欄：數據名單庫 -->
            <aside class="col-span-3 flex flex-col gap-6 overflow-y-auto no-scrollbar">
                <div class="bg-slate-900/40 border border-slate-800/60 rounded-3xl p-6 backdrop-blur-md flex flex-col flex-1 min-h-0">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-sm font-black text-slate-300 tracking-wider">抽獎名冊</h2>
                        <span id="p-count" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-brand-400 font-bold">0 筆</span>
                    </div>

                    <div class="space-y-3 flex-1 flex flex-col min-h-0">
                        <input type="text" id="preview-search" oninput="renderPreviewList()" placeholder="🔍 輸入關鍵字快速搜尋名冊..." class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-brand-500">
                        
                        <!-- 對齊標題欄 -->
                        <div class="grid grid-cols-12 gap-1 px-3 py-2 bg-slate-950/80 rounded-xl text-[10px] font-black uppercase text-slate-500 tracking-wider border border-slate-800/40">
                            <span class="col-span-4">姓名</span>
                            <span class="col-span-4 text-center">身分證字號</span>
                            <span class="col-span-4 text-right">發票編號</span>
                        </div>
                        
                        <!-- 滾動名冊 -->
                        <div id="preview-list" class="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1">
                            <div class="text-slate-600 text-center py-6 italic text-xs">暫無載入名單</div>
                        </div>
                    </div>
                </div>

                <!-- 抽獎配置卡片 -->
                <div class="bg-slate-900/40 border border-slate-800/60 rounded-3xl p-6 backdrop-blur-md">
                    <h2 class="text-sm font-black uppercase text-slate-300 tracking-wider mb-4">抽獎配置設定</h2>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">當前抽選獎項</label>
                            <select id="prize-sel" onchange="syncUI()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-brand-500"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">單次抽選人數</label>
                                <input type="number" id="draw-num" value="1" min="1" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brand-500">
                            </div>
                            <div class="space-y-2 flex flex-col">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">重複中獎過濾</label>
                                <div class="flex-1 flex items-center">
                                    <input type="checkbox" id="dup-check" checked class="w-5 h-5 rounded border-slate-800 bg-slate-950 text-brand-500 focus:ring-brand-500">
                                    <span class="text-xs text-slate-400 ml-2">啟用過濾</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 中間分欄：抽獎核心舞台 -->
            <section class="col-span-6 flex flex-col gap-6" id="capture-stage">
                <div class="flex-1 bg-slate-900/20 border border-slate-800/40 rounded-[40px] p-10 backdrop-blur-xl flex flex-col items-center justify-between relative shadow-2xl">
                    <div class="text-center">
                        <div id="prize-badge" class="px-4 py-1.5 bg-brand-500/10 border border-brand-500/30 text-brand-400 rounded-full text-[10px] font-black tracking-widest uppercase mb-4">極光抽獎舞台</div>
                        <h2 id="cur-prize-name" class="text-3xl font-black text-white italic">尚未選擇獎項</h2>
                    </div>

                    <!-- 抽獎主呈現看板 -->
                    <div id="marquee-box" class="w-full flex flex-col gap-4 max-h-[350px] overflow-y-auto no-scrollbar py-4">
                        <div class="text-slate-600 text-center text-sm font-medium italic">準備啟動雲端抽獎系統...</div>
                    </div>

                    <!-- 抽獎控制按鈕 -->
                    <div class="w-full">
                        <button id="draw-btn" onclick="toggleDraw()" class="w-full py-6 bg-gradient-to-r from-brand-600 to-brand-800 hover:from-brand-500 hover:to-brand-700 text-white font-black text-2xl rounded-[30px] shadow-2xl shadow-brand-900/40 transition-all flex items-center justify-center gap-4 group">
                            <i data-lucide="play" class="w-8 h-8 fill-current group-hover:scale-110 transition-transform"></i> 
                            <span id="btn-text">開始抽獎</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 右側分欄：中獎紀錄歷史看板 -->
            <aside class="col-span-3 flex flex-col h-full overflow-hidden">
                <div class="flex-1 bg-slate-900/40 border border-slate-800/60 rounded-3xl p-6 backdrop-blur-md flex flex-col min-h-0">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
                        <h2 class="text-sm font-black uppercase text-amber-500 tracking-widest flex items-center gap-2">
                            <i data-lucide="trophy" class="w-4 h-4"></i> 中獎紀錄歷史看板
                        </h2>
                        <span id="win-cnt" class="text-xs font-black text-slate-500">0</span>
                    </div>
                    <div id="win-log" class="flex-1 overflow-y-auto space-y-3 no-scrollbar pr-1">
                        <!-- 中獎明細 -->
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button onclick="clearAll()" class="py-3 text-[10px] font-black border border-slate-800 rounded-xl text-slate-600 hover:text-rose-500 hover:bg-rose-500/5 transition-all">重置紀錄</button>
                        <button onclick="exportData()" class="py-3 text-[10px] font-black bg-slate-800 rounded-xl text-slate-300 hover:bg-slate-700 transition-all">匯出 CSV 報表</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 系統設定彈窗 -->
    <div id="settings-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-xl bg-black/60">
        <div class="bg-slate-900 border border-slate-800 rounded-[40px] p-10 max-w-lg w-full shadow-3xl">
            <h3 class="text-2xl font-black mb-8 text-white uppercase tracking-tighter">系統整合設定</h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500">Google Apps Script 應用程式網址</label>
                    <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-slate-300 focus:outline-none focus:border-brand-500 font-mono">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="syncGas()" class="py-4 bg-slate-800 text-white text-sm font-black rounded-2xl hover:bg-slate-700 transition-all">測試與同步</button>
                    <button onclick="toggleModal('settings-modal')" class="py-4 bg-brand-600 text-white text-sm font-black rounded-2xl hover:bg-brand-500 transition-all">確認並儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認清除中獎紀錄自訂彈窗 -->
    <div id="confirm-clear-modal" class="fixed inset-0 bg-slate-950/85 backdrop-blur-sm z-[999] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl text-center">
            <div class="w-12 h-12 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <h3 class="text-base font-bold text-slate-100 mb-2">確定清除中獎紀錄？</h3>
            <p class="text-xs text-slate-400 mb-6">此動作將一併重置雲端配置與本地端儲存的所有得獎資料，且無法復原。</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-2 bg-slate-800 text-slate-300 text-xs font-bold rounded-xl hover:bg-slate-700 transition-all">取消</button>
                <button onclick="executeClear()" class="flex-1 py-2 bg-rose-600 text-white text-xs font-bold rounded-xl hover:bg-rose-500 transition-all">確認重置</button>
            </div>
        </div>
    </div>

    <script>
        // --- 訊息提示引擎 (Toast Helper) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-2xl text-xs font-bold flex items-center gap-2 border transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto`;
            
            if (type === 'success') {
                toast.className += ' bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
                toast.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> <span>${message}</span>`;
            } else if (type === 'error') {
                toast.className += ' bg-rose-500/10 border-rose-500/30 text-rose-400';
                toast.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4"></i> <span>${message}</span>`;
            } else {
                toast.className += ' bg-slate-800 border-slate-700 text-slate-300';
                toast.innerHTML = `<i data-lucide="info" class="w-4 h-4"></i> <span>${message}</span>`;
            }
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);
            
            setTimeout(() => {
                toast.classList.add('translate-y-[-10px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- 核心遮蔽引擎 (Privacy Engine) ---
        const mask = {
            name: (s) => {
                if(!s) return '***';
                if(s.length === 2) return s[0] + '*';
                return s[0] + '*'.repeat(s.length-2) + s[s.length-1];
            },
            id: (s) => {
                if(!s) return '***';
                return s.substring(0,3) + '****' + s.substring(s.length-2);
            },
            phone: (s) => {
                if(!s) return '***';
                return s.substring(0,4) + '***' + s.substring(s.length-3);
            },
            email: (s) => {
                if(!s) return '***';
                const parts = s.split('@');
                return parts[0][0] + '***@' + parts[1];
            }
        };

        // --- App 狀態 ---
        let app = {
            participants: [],
            prizes: [],
            winners: [],
            gasUrl: localStorage.getItem('aurora_v2_gas') || 'https://script.google.com/macros/s/AKfycbwSZNog_mZu6RD3LnNiPB99RU5pNzAwzERQQEC7-qYNigKnDnKY2JQKgLBr9Em-0WOB/exec',
            drawing: false,
            timer: null,
            prize: null,
            // 錄影相關狀態
            stream: null,
            mediaRecorder: null,
            recordedChunks: []
        };

        window.onload = () => {
            lucide.createIcons();
            document.getElementById('gas-url').value = app.gasUrl;
            if(app.gasUrl) syncGas(true);
            const saved = localStorage.getItem('aurora_v2_winners');
            if(saved) { app.winners = JSON.parse(saved); renderWinners(); }
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        // --- 錄影功能授權機制 ---
        async function authorizeRecording() {
            try {
                app.stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: "browser" }, // 優先選擇分享此瀏覽器分頁
                    audio: false
                });
                
                // 監聽使用者停止分享事件
                app.stream.getVideoTracks()[0].addEventListener('ended', () => {
                    app.stream = null;
                    updateRecordUI(false);
                    showToast('錄影分享授權已中斷', 'error');
                });

                updateRecordUI(true);
                showToast('已成功授權！抽獎過程將會自動錄製並儲存。', 'success');
            } catch (e) {
                updateRecordUI(false);
                showToast('錄影授權失敗，系統將在無錄製狀態下運作。', 'error');
            }
        }

        function updateRecordUI(ok) {
            const btn = document.getElementById('record-auth-btn');
            const dot = document.getElementById('record-dot');
            const text = document.getElementById('record-text');
            if (ok) {
                btn.className = "px-4 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/30 flex items-center gap-2 text-xs font-bold text-emerald-400 transition-all";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                text.innerText = "自動錄影已啟用";
            } else {
                btn.className = "px-4 py-2 rounded-xl bg-rose-500/10 border border-rose-500/30 flex items-center gap-2 text-xs font-bold text-rose-400 hover:bg-rose-500/20 transition-all";
                dot.className = "w-2 h-2 rounded-full bg-rose-500";
                text.innerText = "點此授權錄影功能";
            }
        }

        // --- 渲染名單預覽 ---
        function renderPreviewList() {
            const list = document.getElementById('preview-list');
            const search = document.getElementById('preview-search').value.toLowerCase().trim();
            
            const filtered = app.participants.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.idNum.toLowerCase().includes(search) || 
                p.invoice.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-slate-600 text-center py-6 italic text-xs">無匹配名單</div>`;
                return;
            }

            list.innerHTML = filtered.map(p => `
                <div class="grid grid-cols-12 gap-1 items-center px-3.5 py-2.5 bg-slate-950/30 border border-slate-800/40 rounded-xl hover:border-brand-500/30 transition-all text-xs">
                    <span class="col-span-4 font-bold text-slate-200">${mask.name(p.name)}</span>
                    <span class="col-span-4 text-center font-mono text-slate-400">${mask.id(p.idNum)}</span>
                    <span class="col-span-4 text-right font-mono font-bold text-brand-400 text-[11px]">${p.invoice}</span>
                </div>
            `).join('');
        }

        async function syncGas(silent = false) {
            const url = document.getElementById('gas-url').value.trim();
            if(!url) return;
            app.gasUrl = url;
            localStorage.setItem('aurora_v2_gas', url);
            
            try {
                const r = await fetch(`${url}?action=getData`);
                const d = await r.json();
                if(d.status === 'success') {
                    app.participants = d.participants;
                    app.prizes = d.prizes;
                    
                    updatePrizeUI();
                    updateStatus(true);
                    document.getElementById('p-count').innerText = `${app.participants.length} 筆`;
                    
                    renderPreviewList();
                    if(!silent) showToast('雲端名冊與資料同步成功！', 'success');
                }
            } catch(e) { 
                updateStatus(false); 
                if(!silent) showToast('雲端連線異常，請確認部署權限。', 'error');
            }
        }

        function updateStatus(ok) {
            const el = document.getElementById('conn-status');
            el.innerHTML = ok ? `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 已連線至雲端` : `<span class="w-2 h-2 rounded-full bg-rose-500"></span> 連線中斷`;
            el.className = ok ? "px-4 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/30 flex items-center gap-2 text-xs font-bold text-emerald-400" : "px-4 py-2 rounded-xl bg-slate-900/50 border border-slate-800 flex items-center gap-2 text-xs font-bold text-slate-400";
        }

        function updatePrizeUI() {
            const s = document.getElementById('prize-sel');
            s.innerHTML = app.prizes.map(p => `<option value="${p.id}">${p.name} (剩餘 ${p.count - p.drawnCount})</option>`).join('');
            syncUI();
        }

        function syncUI() {
            const id = document.getElementById('prize-sel').value;
            app.prize = app.prizes.find(p => p.id == id);
            if(app.prize) {
                document.getElementById('cur-prize-name').innerText = app.prize.name;
                document.getElementById('prize-badge').innerText = `已抽出: ${app.prize.drawnCount} / 總數: ${app.prize.count}`;
            }
        }

        // --- 抽獎流程 (開始與3秒自動停止) ---
        function toggleDraw() {
            if(app.drawing) {
                stopDraw();
            } else {
                startDraw();
                // 3 秒後自動呼叫停止常式
                setTimeout(() => {
                    if (app.drawing) stopDraw();
                }, 3000);
            }
        }

        async function startDraw() {
            if(!app.participants.length || !app.prize) return showToast('請確認名單與獎項已載入。', 'error');
            app.drawing = true;
            
            // 如果有授權錄影，啟動 MediaRecorder
            if (app.stream) {
                app.recordedChunks = [];
                try {
                    app.mediaRecorder = new MediaRecorder(app.stream, { mimeType: 'video/webm;codecs=vp9' });
                } catch(e) {
                    try {
                        app.mediaRecorder = new MediaRecorder(app.stream, { mimeType: 'video/webm' });
                    } catch(err) {
                        app.mediaRecorder = new MediaRecorder(app.stream);
                    }
                }
                
                app.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) app.recordedChunks.push(e.data);
                };
                app.mediaRecorder.start();
            } else {
                showToast('目前未開啟螢幕錄製，抽獎將不進行錄影備份。', 'info');
            }

            // 鎖定抽獎按鈕，更改狀態
            const btn = document.getElementById('draw-btn');
            btn.disabled = true;
            btn.className = "w-full py-6 bg-slate-800 text-slate-500 font-black text-2xl rounded-[30px] shadow-none cursor-not-allowed flex items-center justify-center gap-4 transition-all";
            document.getElementById('btn-text').innerText = "正在抽選中 (3秒後自動停止)...";
            
            const num = parseInt(document.getElementById('draw-num').value) || 1;
            const box = document.getElementById('marquee-box');
            box.innerHTML = '';
            const cards = [];
            for(let i=0; i<num; i++) {
                const d = document.createElement('div');
                d.className = "marquee-card bg-slate-950/80 p-5 rounded-2xl flex justify-between items-center border border-slate-800/80";
                box.appendChild(d);
                cards.push(d);
            }

            app.timer = setInterval(() => {
                cards.forEach(c => {
                    const p = app.participants[Math.floor(Math.random()*app.participants.length)];
                    c.innerHTML = `
                        <span class="font-black text-brand-400 text-lg">${mask.name(p.name)}</span>
                        <span class="text-xs text-slate-500 font-mono">${mask.id(p.idNum)}</span>
                        <span class="text-xs text-brand-500 font-mono font-bold">${p.invoice}</span>
                    `;
                });
            }, 70);
        }

        async function stopDraw() {
            // 1. 先暫停跑馬燈滾動
            clearInterval(app.timer);
            app.drawing = false;

            // 2. 鎖定按鈕，並變更狀態為正在錄製得獎結果
            const btn = document.getElementById('draw-btn');
            btn.disabled = true;
            btn.className = "w-full py-6 bg-amber-500/10 border border-amber-500/30 text-amber-500 font-black text-2xl rounded-[30px] flex items-center justify-center gap-4 transition-all cursor-wait";
            document.getElementById('btn-text').innerText = "得獎畫面錄製存證中 (3.5秒)...";

            const num = parseInt(document.getElementById('draw-num').value) || 1;
            const winners = pickWinners(num);
            
            if (winners.length === 0) {
                showToast('名單抽獎池中沒有合規的人選！', 'error');
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.className = "w-full py-6 bg-gradient-to-r from-brand-600 to-brand-800 hover:from-brand-500 hover:to-brand-700 text-white font-black text-2xl rounded-[30px] shadow-2xl shadow-brand-900/40 transition-all flex items-center justify-center gap-4 group";
                document.getElementById('btn-text').innerText = "開始抽獎";
                if (app.mediaRecorder && app.mediaRecorder.state !== 'inactive') app.mediaRecorder.stop();
                return;
            }

            // 3. 王者誕生 - 立即將巨型黃金得獎卡渲染到舞台上，並產生漫天灑花 (此刻錄影仍在進行中)
            const box = document.getElementById('marquee-box');
            box.innerHTML = `
                <div class="w-full space-y-3">
                    <!-- 中獎表頭標題橫欄 -->
                    <div class="grid grid-cols-12 gap-2 px-6 py-2.5 bg-amber-500/10 border border-amber-500/20 rounded-xl text-xs font-black uppercase text-amber-500 tracking-widest">
                        <span class="col-span-4 text-left">👑 中獎者姓名</span>
                        <span class="col-span-4 text-center">💳 身分證字號</span>
                        <span class="col-span-4 text-right">🎫 發票編號</span>
                    </div>
                    <!-- 得獎名單卡片 -->
                    <div class="space-y-3">
                        ${winners.map(w => `
                            <div class="winner-card grid grid-cols-12 gap-2 items-center p-6 rounded-[25px]">
                                <div class="col-span-4 text-left">
                                    <span class="text-3xl font-black text-white tracking-tighter block bg-gradient-to-r from-amber-400 to-yellow-500 bg-clip-text text-transparent">${mask.name(w.name)}</span>
                                </div>
                                <div class="col-span-4 text-center">
                                    <span class="text-base font-mono font-bold text-slate-300">${mask.id(w.idNum)}</span>
                                </div>
                                <div class="col-span-4 text-right">
                                    <span class="bg-amber-500 text-slate-950 px-4 py-2 rounded-xl text-sm font-black font-mono inline-block shadow-lg shadow-amber-500/20">${w.invoice}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const time = new Date().toLocaleString();
            winners.forEach(w => app.winners.unshift({ ...w, prizeName: app.prize.name, time }));

            // 啟動炫目彩帶特效
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            saveRecords();
            renderWinners();
            app.prize.drawnCount += winners.length;
            syncUI();

            // 4. 設定非同步定時延遲 (Delay) 3.5秒：讓畫面保留在得獎名單與灑花狀態，隨後才停止錄影並上傳！
            setTimeout(() => {
                // 恢復抽獎按鈕狀態，供下一輪使用
                btn.disabled = false;
                btn.className = "w-full py-6 bg-gradient-to-r from-brand-600 to-brand-800 hover:from-brand-500 hover:to-brand-700 text-white font-black text-2xl rounded-[30px] shadow-2xl shadow-brand-900/40 transition-all flex items-center justify-center gap-4 group";
                document.getElementById('btn-text').innerText = "開始抽獎";

                // 影片停止錄製並傳送至後端
                if (app.mediaRecorder && app.mediaRecorder.state !== 'inactive') {
                    showToast('正在生成與壓縮抽獎影片錄影...', 'info');
                    app.mediaRecorder.onstop = async () => {
                        const blob = new Blob(app.recordedChunks, { type: 'video/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const base64data = reader.result.split(',')[1];
                            uploadAndRecord(winners, time, base64data);
                        };
                    };
                    app.mediaRecorder.stop();
                } else {
                    uploadAndRecord(winners, time, null);
                }
            }, 3500); // 延遲 3.5 秒錄製完整中獎動畫
        }

        // 打包發送 POST 請求給 GAS
        function uploadAndRecord(winners, time, videoBase64) {
            if(app.gasUrl) {
                const cleanUrl = getCleanUrl(app.gasUrl);
                fetch(`${cleanUrl}?action=recordWinners`, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        prizeId: app.prize.id, 
                        prizeName: app.prize.name,
                        winners: winners.map(w => ({ ...w, prizeName: app.prize.name, time })),
                        videoBase64: videoBase64 // 前端轉換完成的錄影資料
                    })
                }).then(() => {
                    showToast('中獎數據已自動上傳並寫入雲端試算表！', 'success');
                });
            }
        }

        function pickWinners(count) {
            let pool = [...app.participants];
            if(document.getElementById('dup-check').checked) {
                const wonInvoices = app.winners.map(w => w.invoice);
                pool = pool.filter(p => !wonInvoices.includes(p.invoice));
            }
            if(pool.length === 0) return [];
            let res = [];
            const drawSize = Math.min(count, pool.length);
            for(let i=0; i<drawSize; i++) {
                let total = pool.reduce((s, x) => s + x.weight, 0);
                let r = Math.random() * total;
                for(let j=0; j<pool.length; j++) {
                    r -= pool[j].weight;
                    if(r <= 0) { res.push(pool[j]); pool.splice(j, 1); break; }
                }
            }
            return res;
        }

        function saveRecords() { localStorage.setItem('aurora_v2_winners', JSON.stringify(app.winners)); }

        // --- 渲染右側歷史看板 ---
        function renderWinners() {
            const list = document.getElementById('win-log');
            document.getElementById('win-cnt').innerText = app.winners.length;
            list.innerHTML = app.winners.map(w => `
                <div class="bg-slate-950/60 border border-slate-800 p-3.5 rounded-2xl flex flex-col gap-1.5 hover:border-brand-500/40 transition-all text-xs font-bold">
                    <div class="flex justify-between items-center border-b border-slate-900 pb-1.5 mb-1">
                        <span class="text-[9px] font-black text-brand-400 uppercase tracking-wider">${w.prizeName}</span>
                        <span class="text-[8px] text-slate-600 font-mono">${w.time.split(' ')[1]}</span>
                    </div>
                    <div class="grid grid-cols-12 gap-1 items-center text-slate-300">
                        <span class="col-span-4 text-slate-200 truncate">${mask.name(w.name)}</span>
                        <span class="col-span-4 text-center font-mono text-slate-500 text-[10px]">${mask.id(w.idNum)}</span>
                        <span class="col-span-4 text-right font-mono text-brand-400 truncate text-[10px]">${w.invoice}</span>
                    </div>
                </div>
            `).join('');
        }

        // --- 清除與重設 ---
        function clearAll() {
            document.getElementById('confirm-clear-modal').classList.remove('hidden');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-clear-modal').classList.add('hidden');
        }

        function executeClear() {
            app.winners = [];
            saveRecords();
            renderWinners();
            if(app.gasUrl) {
                const cleanUrl = getCleanUrl(app.gasUrl);
                fetch(`${cleanUrl}?action=clearWinners`, { method: 'POST', mode: 'no-cors' });
            }
            closeConfirmModal();
            showToast('中獎歷史紀錄與雲端數據已成功重置！', 'success');
        }

        function getCleanUrl(url) {
            let clean = url.trim();
            if (clean.includes('?')) {
                clean = clean.split('?')[0];
            }
            return clean;
        }

        function exportData() {
            let csv = "\uFEFF中獎時間,獎項名稱,得獎者,身分證字號,聯絡資訊,發票編號,電子信箱\n";
            app.winners.forEach(w => csv += `"${w.time}","${w.prizeName}","${w.name}","${w.idNum}","${w.phone}","${w.invoice}","${w.email}"\n`);
            const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const l = document.createElement("a");
            l.href = URL.createObjectURL(b);
            l.download = `中獎報表_${new Date().toISOString().slice(0,10)}.csv`;
            l.click();
        }
    </script>
</body>
</html>
