<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極光智慧抽獎系統 - 安全專業錄影版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f3ff', 100: '#e1e7ff', 200: '#cbd5ff', 300: '#a3b4ff', 400: '#7a8bff', 500: '#4f5eff', 600: '#3b40ff', 700: '#2c2aff', 800: '#2521cc', 900: '#2220a3' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700;900&display=swap');
        * { font-family: 'Noto Sans TC', sans-serif; box-sizing: border-box; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 使用優雅淺灰底色，保護螢幕錄影之對比度，徹底根治黑畫面與色彩擠壓問題 */
        .aurora-bg { background: radial-gradient(circle at 50% -20%, #f8fafc, #f1f5f9, #e2e8f0); position: relative; }
        .marquee-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        /* 黃金中獎卡片：皇家暖金漸層質感，高對比且極利於螢幕錄影 */
        .winner-card { border: 3px solid #d97706; background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); animation: prize-glow 2s infinite alternate; }
        @keyframes prize-glow { from { box-shadow: 0 0 10px rgba(217,119,6,0.1); } to { box-shadow: 0 0 35px rgba(217,119,6,0.3); } }
    </style>
</head>
<body class="aurora-bg text-slate-800 min-h-full overflow-hidden">

    <!-- Toast 訊息容器 -->
    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="relative z-10 max-w-[1750px] mx-auto p-4 lg:p-6 flex flex-col h-screen overflow-hidden">
        <!-- 頁首區塊（整合快捷設定面板、連線狀態與錄影授權） -->
        <header class="flex flex-col xl:flex-row items-center justify-between mb-4 border-b border-slate-200/80 pb-4 gap-4 flex-shrink-0">
            <!-- 左側：系統標誌 -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20 flex-shrink-0">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wider text-slate-900 whitespace-nowrap">極光智慧抽獎安全專業版</h1>
                </div>
            </div>

            <!-- 中間：抽獎快捷配置面板（原左下角面板上提，釋放巨大名冊空間） -->
            <div class="flex flex-wrap items-center gap-3 bg-slate-100/90 border border-slate-200/60 p-2.5 rounded-2xl shadow-sm max-w-full">
                <!-- 當前抽選獎項 (✅ 向兩側大幅度延伸，確保內容完整不切斷) -->
                <div class="flex items-center gap-1.5 pl-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-wider whitespace-nowrap">當前獎項</label>
                    <select id="prize-sel" onchange="syncUI()" class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs text-slate-800 font-bold focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all min-w-[260px] sm:min-w-[340px] lg:min-w-[380px] max-w-full cursor-pointer shadow-sm"></select>
                </div>
                <div class="h-4 w-px bg-slate-300 hidden sm:block"></div>
                <!-- 單次抽選人數 -->
                <div class="flex items-center gap-1.5">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-wider whitespace-nowrap">單次人數</label>
                    <input type="number" id="draw-num" value="1" min="1" class="w-12 bg-white border border-slate-200 rounded-lg px-1.5 py-1 text-xs text-center text-slate-800 font-bold focus:outline-none focus:border-brand-500 transition-all">
                </div>
                <div class="h-4 w-px bg-slate-300 hidden sm:block"></div>
                <!-- 重複中獎過濾 (✅ 更名回熟悉的「重複中獎過濾」) -->
                <label class="flex items-center gap-1.5 cursor-pointer select-none">
                    <input type="checkbox" id="dup-check" checked class="w-4 h-4 rounded border-slate-300 bg-white text-brand-500 focus:ring-brand-500">
                    <span class="text-xs font-bold text-slate-600 whitespace-nowrap">重複中獎過濾</span>
                </label>
            </div>

            <!-- 右側：功能操作 -->
            <div class="flex items-center gap-3 flex-shrink-0">
                <!-- 錄影授權狀態指示燈 -->
                <button id="record-auth-btn" onclick="authorizeRecording()" class="px-3.5 py-1.5 rounded-xl bg-rose-50 border border-rose-200 flex items-center gap-1.5 text-xs font-bold text-rose-600 hover:bg-rose-100 transition-all shadow-sm">
                    <span id="record-dot" class="w-2 h-2 rounded-full bg-rose-500"></span> <span id="record-text">點此授權錄影</span>
                </button>
                <div id="conn-status" class="px-3.5 py-1.5 rounded-xl bg-slate-100 border border-slate-200 flex items-center gap-1.5 text-xs font-bold text-slate-600 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-slate-400"></span> 離線模式
                </div>
                <button onclick="toggleModal('settings-modal')" class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 rounded-xl transition-all shadow-sm">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- 經典三分欄 (自適應防溢出佈局) -->
        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0 lg:overflow-hidden mb-2 overflow-y-auto lg:overflow-y-hidden">
            <!-- 左側分欄：數據名單庫 -->
            <aside class="col-span-1 lg:col-span-3 flex flex-col min-h-[300px] lg:min-h-0 lg:h-full overflow-hidden">
                <div class="bg-white border border-slate-200/60 rounded-3xl p-4 shadow-md shadow-slate-200/50 flex flex-col h-full min-h-0 overflow-hidden">
                    <div class="flex items-center justify-between mb-3 flex-shrink-0">
                        <h2 class="text-xs font-black text-slate-800 tracking-wider uppercase flex items-center gap-1.5">
                            <i data-lucide="users" class="w-4 h-4 text-brand-500"></i> 抽獎名冊
                        </h2>
                        <span id="p-count" class="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-brand-600 font-bold">0 筆</span>
                    </div>

                    <div class="space-y-3 flex-1 flex flex-col min-h-0 overflow-hidden">
                        <input type="text" id="preview-search" oninput="renderPreviewList()" placeholder="🔍 輸入關鍵字快速搜尋..." class="w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-brand-500/50 focus:bg-white transition-all flex-shrink-0">
                        
                        <!-- 智慧自適應標題欄 -->
                        <div id="preview-header-row" class="flex-shrink-0"></div>
                        
                        <!-- 滾動名冊 -->
                        <div id="preview-list" class="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1">
                            <div class="text-slate-400 text-center py-6 italic text-xs">暫無載入名單</div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 中間分欄：抽獎核心舞台 -->
            <section class="col-span-1 lg:col-span-6 flex flex-col min-h-[450px] lg:min-h-0 lg:h-full overflow-hidden" id="capture-stage">
                <div class="flex-1 bg-white border border-slate-200/60 rounded-[32px] p-6 lg:p-8 shadow-2xl shadow-slate-200/80 flex flex-col items-center justify-between min-h-0 overflow-hidden relative">
                    <div class="text-center flex-shrink-0">
                        <div id="prize-badge" class="inline-block px-3 py-1 bg-brand-50 border border-brand-200 text-brand-600 rounded-full text-[10px] font-black tracking-widest uppercase mb-2">極光抽獎舞台</div>
                        <h2 id="cur-prize-name" class="text-2xl lg:text-3xl font-black text-slate-950 italic">尚未選擇獎項</h2>
                    </div>

                    <!-- 抽獎主呈現看板 -->
                    <div id="marquee-box" class="w-full flex-1 overflow-y-auto no-scrollbar py-4 min-h-0">
                        <div class="text-slate-400 text-center text-sm font-medium italic mt-12">準備啟動雲端抽獎系統...</div>
                    </div>

                    <!-- 抽獎控制按鈕組合 (精簡水平雙軌控制列) -->
                    <div class="w-full flex-shrink-0 pt-4 border-t border-slate-100">
                        <div class="grid grid-cols-2 gap-4">
                            <button id="draw-btn" onclick="toggleDraw()" class="w-full py-3.5 bg-gradient-to-r from-brand-600 to-brand-800 hover:from-brand-500 hover:to-brand-700 text-white font-black text-base lg:text-lg rounded-2xl shadow-lg shadow-brand-900/15 transition-all flex items-center justify-center gap-2 group truncate">
                                <i data-lucide="play" class="w-5 h-5 fill-current group-hover:scale-110 transition-transform flex-shrink-0"></i> 
                                <span id="btn-text" class="truncate">開始抽獎</span>
                            </button>
                            
                            <!-- ⚡ 一次抽完所有品項 (一鍵大抽選黃金按鈕) -->
                            <button id="grand-draw-btn" onclick="toggleGrandDraw()" class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-black text-base lg:text-lg rounded-2xl shadow-md shadow-amber-600/10 transition-all flex items-center justify-center gap-2 group truncate">
                                <i data-lucide="zap" class="w-5 h-5 fill-current text-yellow-200 animate-pulse flex-shrink-0"></i>
                                <span id="grand-btn-text" class="truncate">⚡ 一鍵大抽選</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右側分欄：中獎紀錄歷史看板 -->
            <aside class="col-span-1 lg:col-span-3 flex flex-col min-h-[300px] lg:min-h-0 lg:h-full overflow-hidden">
                <div class="flex-1 bg-white border border-slate-200/60 rounded-3xl p-4 shadow-md shadow-slate-200/50 flex flex-col min-h-0 overflow-hidden">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-200 pb-3 flex-shrink-0">
                        <h2 class="text-xs font-black uppercase text-amber-600 tracking-widest flex items-center gap-1.5">
                            <i data-lucide="trophy" class="w-4 h-4 text-amber-500"></i> 中獎紀錄看板
                        </h2>
                        <span id="win-cnt" class="text-xs font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded">0</span>
                    </div>
                    <div id="win-log" class="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1">
                        <!-- 中獎明細 -->
                    </div>
                    <div class="mt-3 flex-shrink-0">
                        <button onclick="clearAll()" class="w-full py-2.5 text-xs font-black bg-slate-100 text-slate-600 border border-slate-200 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 transition-all rounded-xl">重置紀錄</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 系統設定彈窗 (✅ 寬度自 max-w-lg 放大至 max-w-2xl，內距調整為 p-10 圓角 rounded-[40px]) -->
    <div id="settings-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-xl bg-slate-900/30">
        <div class="bg-white border border-slate-200 rounded-[40px] p-10 max-w-2xl w-full shadow-3xl">
            <h3 class="text-2xl font-black mb-5 text-slate-950 uppercase tracking-tighter flex items-center gap-2">
                <i data-lucide="sliders" class="w-6 h-6 text-brand-500"></i> 系統整合設定
            </h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Google Apps Script 應用程式網址</label>
                    <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/..." class="w-full bg-slate-100 border border-slate-200 rounded-2xl px-5 py-4 text-sm text-slate-800 focus:outline-none focus:border-brand-500 focus:bg-white transition-all font-mono font-bold">
                </div>

                <!-- 抽獎進階開關 (Feature Toggles) -->
                <div class="border-t border-slate-200 pt-4 space-y-3">
                    <h4 class="text-xs font-black text-slate-700 uppercase tracking-wider">進階規則配置 (Feature Toggles)</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <!-- 👑 方案 B 設定區塊 (雙欄寬度展示) -->
                        <label class="flex items-center gap-3 p-3 bg-amber-50 border border-amber-200 rounded-2xl cursor-pointer hover:bg-amber-100 transition-all select-none col-span-2 shadow-sm">
                            <input type="checkbox" id="option-b-check" checked class="w-5 h-5 rounded border-amber-300 bg-white text-brand-600 focus:ring-brand-500">
                            <div class="text-left">
                                <span class="text-xs font-black text-amber-900 block">啟用方案 B：硬性權重排序 (預設)</span>
                                <span class="text-[10px] text-amber-700 font-normal">防越級！大獎優先配給高權重，同分時才採用亂數抽選。</span>
                            </div>
                        </label>
                        
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="cross-exclude-check" checked class="w-4 h-4 rounded border-slate-300 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-xs font-bold text-slate-700">跨獎項排除中獎者</span>
                        </label>
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="fast-mode-check" class="w-4 h-4 rounded border-slate-300 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-xs font-bold text-slate-700">快速模式 (跳過動畫)</span>
                        </label>
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="sound-check" checked class="w-4 h-4 rounded border-slate-300 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-xs font-bold text-slate-700">啟用離線合成音效</span>
                        </label>
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="serial-number-check" checked class="w-4 h-4 rounded border-slate-300 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-xs font-bold text-slate-700">中獎顯示 No. 流水號</span>
                        </label>
                        
                        <!-- 次要降維設定 -->
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="raw-weight-check" checked class="w-4 h-4 rounded border-slate-200 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-[11px] font-bold text-slate-500">使用原始數值為權重</span>
                        </label>
                        <label class="flex items-center gap-2.5 p-3 bg-slate-50 border border-slate-100 rounded-2xl cursor-pointer hover:bg-slate-100 transition-all select-none shadow-sm">
                            <input type="checkbox" id="power-weight-check" checked class="w-4 h-4 rounded border-slate-200 bg-white text-brand-500 focus:ring-brand-500">
                            <span class="text-[11px] font-bold text-slate-500">啟用權重二次方極限放大</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-3">
                    <button onclick="syncGas()" class="py-4 bg-slate-100 text-slate-700 text-sm font-black rounded-2xl border border-slate-200 hover:bg-slate-200 transition-all">測試與同步</button>
                    <button onclick="saveSettings()" class="py-4 bg-brand-600 text-white text-sm font-black rounded-2xl hover:bg-brand-500 transition-all">確認並儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認清除中獎紀錄自訂彈窗 -->
    <div id="confirm-clear-modal" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[999] hidden flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 max-w-sm w-full shadow-2xl text-center">
            <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-100">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <h3 class="text-base font-bold text-slate-900 mb-2">確定清除中獎紀錄？</h3>
            <p class="text-xs text-slate-500 mb-6">此動作將一併重置雲端配置與本地端儲存的所有得獎資料，且無法復原。</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-200 transition-all">取消</button>
                <button onclick="executeClear()" class="flex-1 py-2 bg-rose-600 text-white text-xs font-bold rounded-xl hover:bg-rose-500 transition-all">確認重置</button>
            </div>
        </div>
    </div>

    <script>
        // --- 離線音效合成引擎 ---
        const audio = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playTick() {
                if (!document.getElementById('sound-check').checked) return;
                try {
                    this.init();
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(650, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.04);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.04);
                } catch(e) {}
            },
            playTada() {
                if (!document.getElementById('sound-check').checked) return;
                try {
                    this.init();
                    const now = this.ctx.currentTime;
                    const playNote = (freq, delay, duration, vol) => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + delay);
                        gain.gain.setValueAtTime(vol, now + delay);
                        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);
                        osc.start(now + delay);
                        osc.stop(now + delay + duration);
                    };
                    playNote(523.25, 0, 0.12, 0.12); // C5
                    playNote(659.25, 0.05, 0.12, 0.12); // E5
                    playNote(783.99, 0.1, 0.12, 0.12); // G5
                    playNote(1046.50, 0.18, 0.7, 0.16); // C6
                } catch(e) {}
            }
        };

        // --- 訊息提示引擎 ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-2xl text-xs font-bold flex items-center gap-2 border transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto`;
            
            if (type === 'success') {
                toast.className += ' bg-emerald-50 border-emerald-200 text-emerald-800';
                toast.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> <span>${message}</span>`;
            } else if (type === 'error') {
                toast.className += ' bg-rose-50 border-rose-200 text-rose-800';
                toast.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4"></i> <span>${message}</span>`;
            } else {
                toast.className += ' bg-slate-100 border-slate-200 text-slate-800';
                toast.innerHTML = `<i data-lucide="info" class="w-4 h-4"></i> <span>${message}</span>`;
            }
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);
            
            setTimeout(() => {
                toast.classList.add('translate-y-[-10px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- 隱私遮蔽引擎 ---
        const mask = {
            name: (s) => {
                if(!s) return '***';
                if(s.length === 2) return s[0] + '*';
                return s[0] + '*'.repeat(s.length-2) + s[s.length-1];
            },
            id: (s) => {
                if(!s) return '***';
                return s.substring(0,3) + '****' + s.substring(s.length-2);
            },
            phone: (s) => {
                if(!s) return '***';
                return s.substring(0,4) + '***' + s.substring(s.length-3);
            },
            email: (s) => {
                if(!s) return '***';
                const parts = s.split('@');
                return parts[0][0] + '***@' + parts[1];
            }
        };

        // --- App 狀態 ---
        let app = {
            participants: [],
            prizes: [],
            winners: [],
            gasUrl: localStorage.getItem('aurora_v2_gas') || 'https://script.google.com/macros/s/AKfycbwSZNog_mZu6RD3LnNiPB99RU5pNzAwzERQQEC7-qYNigKnDnKY2JQKgLBr9Em-0WOB/exec',
            drawing: false,
            grandDrawing: false,
            timer: null,
            prize: null,
            rawMin: 1,
            rawMax: 1,
            activeFields: {
                name: true,
                idNum: false,
                invoice: false
            },
            activeColumnCount: 1,
            isGrandDrawMode: false,
            stream: null,
            mediaRecorder: null,
            recordedChunks: []
        };

        window.onload = () => {
            lucide.createIcons();
            document.getElementById('gas-url').value = app.gasUrl;
            
            // 進階開關載入
            document.getElementById('cross-exclude-check').checked = localStorage.getItem('cfg_cross_exclude') !== 'false';
            document.getElementById('fast-mode-check').checked = localStorage.getItem('cfg_fast_mode') === 'true';
            document.getElementById('sound-check').checked = localStorage.getItem('cfg_sound') !== 'false';
            document.getElementById('serial-number-check').checked = localStorage.getItem('cfg_serial') !== 'false';
            
            // 👑 預設啟用核心方案 B 以及對應的權重直抽放大設置
            document.getElementById('option-b-check').checked = localStorage.getItem('cfg_option_b') !== 'false';
            document.getElementById('raw-weight-check').checked = localStorage.getItem('cfg_raw_weight') !== 'false';
            document.getElementById('power-weight-check').checked = localStorage.getItem('cfg_power_weight') !== 'false';

            if(app.gasUrl) syncGas(true);
            const saved = localStorage.getItem('aurora_v2_winners');
            if(saved) { app.winners = JSON.parse(saved); renderWinners(); }

            // 快捷鍵：Ctrl + Shift + Enter 開始抽單品
            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && e.key === 'Enter') {
                    e.preventDefault();
                    if (!app.drawing && !app.grandDrawing) {
                        toggleDraw();
                    }
                }
            });
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        // --- 儲存設定 ---
        function saveSettings() {
            localStorage.setItem('cfg_cross_exclude', document.getElementById('cross-exclude-check').checked);
            localStorage.setItem('cfg_fast_mode', document.getElementById('fast-mode-check').checked);
            localStorage.setItem('cfg_sound', document.getElementById('sound-check').checked);
            localStorage.setItem('cfg_serial', document.getElementById('serial-number-check').checked);
            localStorage.setItem('cfg_option_b', document.getElementById('option-b-check').checked);
            localStorage.setItem('cfg_raw_weight', document.getElementById('raw-weight-check').checked);
            localStorage.setItem('cfg_power_weight', document.getElementById('power-weight-check').checked);
            
            const urlInput = document.getElementById('gas-url').value.trim();
            if(urlInput) {
                app.gasUrl = urlInput;
                localStorage.setItem('aurora_v2_gas', urlInput);
                syncGas(true);
            }
            toggleModal('settings-modal');
            showToast('進階規則與配置已成功儲存！', 'success');
        }

        // --- 錄影授權 ---
        async function authorizeRecording() {
            try {
                app.stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: "browser" }, 
                    audio: false
                });
                
                app.stream.getVideoTracks()[0].addEventListener('ended', () => {
                    app.stream = null;
                    updateRecordUI(false);
                    showToast('錄影分享授權已中斷', 'error');
                });

                updateRecordUI(true);
                showToast('已成功授權！抽獎過程將會自動錄製並儲存。', 'success');
            } catch (e) {
                updateRecordUI(false);
                showToast('錄影授權失敗，系統將在無錄製狀態下運作。', 'error');
            }
        }

        function updateRecordUI(ok) {
            const btn = document.getElementById('record-auth-btn');
            const dot = document.getElementById('record-dot');
            const text = document.getElementById('record-text');
            if (ok) {
                btn.className = "px-3.5 py-1.5 rounded-xl bg-emerald-50 border border-emerald-200 flex items-center gap-1.5 text-xs font-bold text-emerald-600 transition-all shadow-sm";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                text.innerText = "自動錄影中";
            } else {
                btn.className = "px-3.5 py-1.5 rounded-xl bg-rose-50 border border-rose-200 flex items-center gap-1.5 text-xs font-bold text-rose-600 hover:bg-rose-100 transition-all shadow-sm";
                dot.className = "w-2 h-2 rounded-full bg-rose-500";
                text.innerText = "授權錄影";
            }
        }

        // --- 尋找原始權重極端邊界 ---
        function findRawBounds() {
            if (!app.participants.length) return;
            const weights = app.participants.map(p => Number(p.weight) || 1);
            app.rawMin = Math.min(...weights);
            app.rawMax = Math.max(...weights);
            if (app.rawMax === app.rawMin) {
                app.rawMax += 0.001; 
            }
        }

        // --- 智慧線性映射與次方級放大公式 ---
        function getRescaledWeight(participant, prizeMin, prizeMax) {
            const rawVal = Number(participant.weight) || 1;
            const useRaw = document.getElementById('raw-weight-check').checked;
            let weight = rawVal;
            
            if (!useRaw) {
                weight = prizeMin + ((rawVal - app.rawMin) / (app.rawMax - app.rawMin)) * (prizeMax - prizeMin);
            }
            
            const usePower = document.getElementById('power-weight-check').checked;
            if (usePower) {
                weight = Math.pow(weight, 2);
            }
            
            return Number(weight.toFixed(4));
        }

        // --- 智慧名單預覽渲染 ---
        function renderPreviewList() {
            const list = document.getElementById('preview-list');
            const header = document.getElementById('preview-header-row');
            const search = document.getElementById('preview-search').value.toLowerCase().trim();
            
            const filtered = app.participants.filter(p => 
                p.name.toLowerCase().includes(search) || 
                (p.idNum && p.idNum.toLowerCase().includes(search)) || 
                (p.invoice && p.invoice.toLowerCase().includes(search))
            );

            let colsCount = app.activeColumnCount;
            header.className = `grid grid-cols-${colsCount} gap-2 px-3 py-2 bg-slate-100 rounded-xl text-[10px] font-black uppercase text-slate-500 tracking-wider border border-slate-200`;
            
            let headerHtml = '';
            if (app.activeFields.name) headerHtml += `<span class="whitespace-nowrap">姓名</span>`;
            if (app.activeFields.idNum) headerHtml += `<span class="text-center whitespace-nowrap">身分證</span>`;
            if (app.activeFields.invoice) headerHtml += `<span class="text-right whitespace-nowrap">發票編號</span>`;
            header.innerHTML = headerHtml;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-slate-400 text-center py-6 italic text-xs">無匹配名單</div>`;
                return;
            }

            list.innerHTML = filtered.map(p => {
                let itemHtml = `<div class="grid grid-cols-${colsCount} gap-2 items-center px-3.5 py-2.5 bg-white border border-slate-200 rounded-xl hover:border-brand-500/30 transition-all text-xs">`;
                if (app.activeFields.name) itemHtml += `<span class="font-bold text-slate-800 truncate">${mask.name(p.name)}</span>`;
                if (app.activeFields.idNum) itemHtml += `<span class="text-center font-mono text-slate-500 truncate">${mask.id(p.idNum)}</span>`;
                if (app.activeFields.invoice) itemHtml += `<span class="text-right font-mono font-bold text-brand-600 text-[11px] truncate">${p.invoice}</span>`;
                itemHtml += `</div>`;
                return itemHtml;
            }).join('');
        }

        async function syncGas(silent = false) {
            const url = document.getElementById('gas-url').value.trim();
            if(!url) return;
            app.gasUrl = url;
            localStorage.setItem('aurora_v2_gas', url);
            
            try {
                const r = await fetch(`${url}?action=getData`);
                const d = await r.json();
                if(d.status === 'success') {
                    app.participants = d.participants;
                    app.prizes = d.prizes;
                    
                    app.activeFields = {
                        name: true,
                        idNum: app.participants.some(p => p.idNum && p.idNum.toString().trim() !== ""),
                        invoice: app.participants.some(p => p.invoice && p.invoice.toString().trim() !== "")
                    };
                    app.activeColumnCount = Object.values(app.activeFields).filter(Boolean).length;

                    findRawBounds();
                    updatePrizeUI();
                    updateStatus(true);
                    document.getElementById('p-count').innerText = `${app.participants.length} 筆`;
                    
                    renderPreviewList();
                    if(!silent) showToast('雲端名冊與資料自適應同步成功！', 'success');
                }
            } catch(e) { 
                updateStatus(false); 
                if(!silent) showToast('雲端連線異常，請確認部署權限。', 'error');
            }
        }

        function updateStatus(ok) {
            const el = document.getElementById('conn-status');
            el.innerHTML = ok ? `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 已連線至雲端` : `<span class="w-2 h-2 rounded-full bg-rose-500"></span> 連線中斷`;
            el.className = ok ? "px-3.5 py-1.5 rounded-xl bg-emerald-50 border border-emerald-200 flex items-center gap-1.5 text-xs font-bold text-emerald-600 shadow-sm" : "px-3.5 py-1.5 rounded-xl bg-slate-100 border border-slate-200 flex items-center gap-1.5 text-xs font-bold text-slate-600 shadow-sm";
        }

        function updatePrizeUI() {
            const s = document.getElementById('prize-sel');
            s.innerHTML = app.prizes.map(p => `<option value="${p.id}">${p.name} (剩餘 ${p.count - p.drawnCount})</option>`).join('');
            syncUI();
        }

        function syncUI() {
            const id = document.getElementById('prize-sel').value;
            app.prize = app.prizes.find(p => p.id == id);
            if(app.prize) {
                document.getElementById('cur-prize-name').innerText = app.prize.name;
                document.getElementById('prize-badge').innerText = `已抽出: ${app.prize.drawnCount} / 總數: ${app.prize.count}`;
            }
        }

        function startRecordingStream() {
            if (app.stream) {
                app.recordedChunks = [];
                try {
                    app.mediaRecorder = new MediaRecorder(app.stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
                } catch(e) {
                    try {
                        app.mediaRecorder = new MediaRecorder(app.stream, { mimeType: 'video/webm', videoBitsPerSecond: 8000000 });
                    } catch(err) {
                        app.mediaRecorder = new MediaRecorder(app.stream);
                    }
                }
                app.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) app.recordedChunks.push(e.data);
                };
                app.mediaRecorder.start();
            } else {
                showToast('未開啟螢幕授權錄影，將不進行錄影備份。', 'info');
            }
        }

        // --- 方案 A 核心分頁輪播與動態定格引擎 ---
        function startPaginationRender(winners, isGrandDraw, onComplete) {
            const isFastMode = document.getElementById('fast-mode-check').checked;
            const pageDisplayTime = 3000; // 每頁定格 3 秒
            
            // 智慧分頁：大於等於 30 人每頁 10 人（雙列），其餘每頁 3 人（單列，確保中低解析度完全無損不溢出）
            const itemsPerPage = (winners.length >= 30) ? 10 : 3;
            const totalPages = Math.ceil(winners.length / itemsPerPage);
            
            if (isFastMode) {
                // 快速模式：一鍵全屏
                renderPage(winners, 0, winners.length, isGrandDraw, 1, 1);
                setTimeout(() => {
                    onComplete();
                }, 100);
                return;
            }

            let currentPage = 0;
            renderPage(winners, currentPage, itemsPerPage, isGrandDraw, currentPage + 1, totalPages);
            
            const interval = setInterval(() => {
                currentPage++;
                if (currentPage < totalPages) {
                    renderPage(winners, currentPage, itemsPerPage, isGrandDraw, currentPage + 1, totalPages);
                    confetti({ particleCount: 30, spread: 45, origin: { y: 0.6 } });
                } else {
                    clearInterval(interval);
                }
            }, pageDisplayTime);

            const totalDelay = (totalPages * pageDisplayTime) + 1500;
            setTimeout(() => {
                clearInterval(interval);
                onComplete();
            }, totalDelay);
        }

        // 渲染指定分頁畫面
        function renderPage(winners, pageIndex, itemsPerPage, isGrandDraw, pageNum, totalPages) {
            const box = document.getElementById('marquee-box');
            
            // 👑 【黃金核心修復】1. 強制重置滾動位置為 0，徹底終結瀏覽器保留上一頁 scrollTop 造成的切頂與破圖 Bug！
            box.scrollTop = 0;
            
            // 👑 【黃金核心修復】2. 強制在錄影存證展示階段關閉 overflow-y，確保影片乾淨無滾動條！
            box.style.overflowY = 'hidden'; 
            
            const showInvoice = app.activeFields.invoice;
            
            // 決定欄位寬度
            let colsCount = isGrandDraw ? (showInvoice ? 4 : 3) : app.activeColumnCount;
            const gridClass = `grid grid-cols-${colsCount} gap-2`;
            
            // 👑 縮小表頭間距 py-2 與 mb-2.5，為下方卡片釋放黃金高度空間
            let headerHtml = `
            <div class="flex justify-between items-center bg-amber-50 px-4 py-2 border border-amber-200 rounded-xl mb-2.5 shadow-sm select-none">
                <span class="text-xs font-black text-amber-800 uppercase tracking-widest">📋 一鍵大抽選存證畫面 - 第 ${pageNum} / ${totalPages} 頁</span>
                <span class="text-[10px] font-mono font-black bg-amber-600 text-white px-2 py-0.5 rounded-full">頁數: ${pageNum} / ${totalPages}</span>
            </div>
            <div class="${gridClass} px-4 py-2.5 bg-amber-100/50 border border-amber-200 rounded-xl text-[10px] font-black uppercase text-amber-700 tracking-wider shadow-sm">
            `;
            
            if (isGrandDraw) {
                headerHtml += `<span class="text-left whitespace-nowrap">👑 獲得獎項</span>`;
                headerHtml += `<span class="text-center whitespace-nowrap">得獎者</span>`;
                headerHtml += `<span class="text-center whitespace-nowrap">💳 身分證號</span>`;
                if (showInvoice) headerHtml += `<span class="text-right whitespace-nowrap">🎫 發票號碼</span>`;
            } else {
                if (app.activeFields.name)    headerHtml += `<span class="text-left whitespace-nowrap">👑 得獎者</span>`;
                if (app.activeFields.idNum)   headerHtml += `<span class="text-center whitespace-nowrap">💳 身分證號</span>`;
                if (app.activeFields.invoice) headerHtml += `<span class="text-right whitespace-nowrap">🎫 發票號碼</span>`;
            }
            headerHtml += `</div>`;

            // 取得該頁得獎人
            const startIdx = pageIndex * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, winners.length);
            const pageWinners = winners.slice(startIdx, endIdx);

            const isDoubleColumn = (itemsPerPage === 10);
            
            // 👑 縮小間距：單列卡片間距改為 gap-2.5，釋放垂直高度防止溢出
            const listContainerClass = isDoubleColumn ? "grid grid-cols-2 gap-2" : "flex flex-col gap-2";

            const isSerialNumEnabled = document.getElementById('serial-number-check').checked;

            const listHtml = pageWinners.map((w, idx) => {
                const absoluteIndex = startIdx + idx;
                
                // 👑 【黃金核心修復】3. 重新定製卡片內距、字體級距，大幅收縮垂直高度，徹底防止溢出
                const cardPadding = isDoubleColumn ? "p-2.5 rounded-xl" : "py-3.5 px-5 rounded-2xl";
                const nameSize = isDoubleColumn ? "text-lg" : "text-2xl lg:text-3xl";
                const infoSize = isDoubleColumn ? "text-xs font-mono" : "text-sm md:text-base font-mono";
                const badgePadding = isDoubleColumn ? "px-2 py-0.5 text-xs" : "px-3.5 py-1 text-sm";

                let cardRows = `<div class="winner-card ${gridClass} items-center ${cardPadding} shadow-sm">`;
                
                if (isGrandDraw) {
                    cardRows += `<div class="text-left truncate flex items-center gap-2">
                        ${isSerialNumEnabled ? `<span class="inline-flex items-center justify-center bg-amber-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm">No.${absoluteIndex + 1}</span>` : ''}
                        <span class="text-sm lg:text-base font-black text-amber-950 truncate whitespace-nowrap">${w.prizeName}</span>
                    </div>`;
                    cardRows += `<div class="text-center truncate">
                        <span class="text-xl lg:text-2xl font-black bg-gradient-to-r from-amber-800 to-yellow-600 bg-clip-text text-transparent whitespace-nowrap">${mask.name(w.name)}</span>
                    </div>`;
                    cardRows += `<div class="text-center truncate">
                        <span class="text-xs lg:text-sm font-mono font-bold text-slate-700 whitespace-nowrap">${mask.id(w.idNum)}</span>
                    </div>`;
                    if (showInvoice) {
                        cardRows += `<div class="text-right truncate">
                            <span class="bg-amber-600 text-white px-2.5 py-1 rounded-xl text-xs font-black font-mono inline-block whitespace-nowrap">${w.invoice || '無'}</span>
                        </div>`;
                    }
                } else {
                    if (app.activeFields.name) {
                        cardRows += `
                        <div class="text-left truncate flex items-center gap-3">
                            ${isSerialNumEnabled ? `<span class="inline-flex items-center justify-center bg-amber-600 text-white text-[10px] font-black px-1.5 py-0.5 rounded shadow-sm select-none">No.${absoluteIndex + 1}</span>` : ''}
                            <span class="${nameSize} font-black block bg-gradient-to-r from-amber-800 to-yellow-600 bg-clip-text text-transparent tracking-tighter whitespace-nowrap">${mask.name(w.name)}</span>
                        </div>`;
                    }
                    if (app.activeFields.idNum) {
                        cardRows += `<div class="text-center truncate"><span class="${infoSize} font-bold text-slate-700 whitespace-nowrap">${mask.id(w.idNum)}</span></div>`;
                    }
                    if (app.activeFields.invoice) {
                        cardRows += `
                        <div class="text-right truncate">
                            <span class="bg-amber-600 text-white ${badgePadding} rounded-xl font-black font-mono inline-block shadow-lg shadow-amber-600/20 whitespace-nowrap">${w.invoice}</span>
                        </div>`;
                    }
                }
                cardRows += `</div>`;
                return cardRows;
            }).join('');

            box.innerHTML = `
                <div class="w-full">
                    ${headerHtml}
                    <div class="mt-2.5 ${listContainerClass}">
                        ${listHtml}
                    </div>
                </div>
            `;
        }

        // --- 單品項抽獎流程 ---
        function toggleDraw() {
            if(app.drawing) {
                stopDraw();
            } else {
                app.isGrandDrawMode = false;
                startDraw();
                
                const isFastMode = document.getElementById('fast-mode-check').checked;
                if (isFastMode) {
                    stopDraw();
                } else {
                    setTimeout(() => {
                        if (app.drawing) stopDraw();
                    }, 3000);
                }
            }
        }

        async function startDraw() {
            if(!app.participants.length || !app.prize) return showToast('請確認名單與獎項已載入。', 'error');
            app.drawing = true;
            
            startRecordingStream();

            const btn = document.getElementById('draw-btn');
            const gBtn = document.getElementById('grand-draw-btn');
            btn.disabled = true;
            gBtn.disabled = true;
            
            btn.className = "w-full py-3.5 bg-slate-200 text-slate-400 font-black text-base lg:text-lg rounded-2xl cursor-not-allowed flex items-center justify-center gap-2 transition-all border border-slate-300/60 truncate";
            gBtn.className = "w-full py-3.5 bg-slate-100 text-slate-400 font-bold text-base lg:text-lg rounded-2xl border border-slate-200 cursor-not-allowed flex items-center justify-center gap-2 transition-all truncate";
            
            document.getElementById('btn-text').innerText = "正在抽選...";
            
            const num = parseInt(document.getElementById('draw-num').value) || 1;
            const box = document.getElementById('marquee-box');
            box.innerHTML = '';
            const cards = [];
            for(let i=0; i<num; i++) {
                const d = document.createElement('div');
                box.appendChild(d);
                cards.push(d);
            }

            app.timer = setInterval(() => {
                audio.playTick();
                cards.forEach(c => {
                    const p = app.participants[Math.floor(Math.random()*app.participants.length)];
                    let itemHtml = '';
                    if (app.activeFields.name) itemHtml += `<span class="font-black text-brand-600 text-base truncate text-left">${mask.name(p.name)}</span>`;
                    if (app.activeFields.idNum) itemHtml += `<span class="text-xs text-slate-500 font-mono text-center truncate">${mask.id(p.idNum)}</span>`;
                    if (app.activeFields.invoice) itemHtml += `<span class="text-xs text-brand-600 font-mono font-bold text-right truncate">${p.invoice}</span>`;
                    
                    c.className = `marquee-card bg-slate-50 p-4 rounded-xl grid grid-cols-${app.activeColumnCount} gap-2 items-center border border-slate-200`;
                    c.innerHTML = itemHtml;
                });
            }, 70);
        }

        async function stopDraw() {
            clearInterval(app.timer);
            app.drawing = false;

            const winners = pickWinners(parseInt(document.getElementById('draw-num').value) || 1, app.prize);
            
            if (winners.length === 0) {
                showToast('名單中沒有合規的人選！', 'error');
                restoreButtons();
                if (app.mediaRecorder && app.mediaRecorder.state !== 'inactive') app.mediaRecorder.stop();
                return;
            }

            // 計算方案 A 動態延遲
            const itemsPerPage = (winners.length >= 30) ? 10 : 5;
            const totalPages = Math.ceil(winners.length / itemsPerPage);
            const totalDelaySeconds = (((totalPages * 3000) + 1500) / 1000).toFixed(1);

            const btn = document.getElementById('draw-btn');
            btn.className = "w-full py-3.5 bg-amber-500/10 border border-amber-500/30 text-amber-600 font-black text-xs lg:text-sm rounded-2xl flex items-center justify-center gap-2 transition-all cursor-wait truncate";
            document.getElementById('btn-text').innerText = `存證中 (${totalDelaySeconds}秒)...`;

            const time = new Date().toLocaleString();
            winners.forEach(w => app.winners.unshift({ ...w, prizeName: app.prize.name, time }));

            // 觸發音效與彩帶
            audio.playTada();
            saveRecords();
            renderWinners();
            app.prize.drawnCount += winners.length;
            syncUI();

            // 啟動方案 A 智慧分頁渲染引擎
            startPaginationRender(winners, false, () => {
                restoreButtons();
                if (app.mediaRecorder && app.mediaRecorder.state !== 'inactive') {
                    showToast('正在生成與壓縮中獎錄影檔...', 'info');
                    app.mediaRecorder.onstop = async () => {
                        const blob = new Blob(app.recordedChunks, { type: 'video/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const base64data = reader.result.split(',')[1];
                            uploadAndRecord(winners, time, base64data, false);
                        };
                    };
                    app.mediaRecorder.stop();
                } else {
                    uploadAndRecord(winners, time, null, false);
                }
            });
        }

        // --- 一鍵大抽選：一次抽完全部品項 (Grand Draw) ---
        function toggleGrandDraw() {
            if (app.grandDrawing) return;
            app.isGrandDrawMode = true;
            startGrandDraw();
        }

        async function startGrandDraw() {
            const totalRemainingPrizeM = app.prizes.reduce((sum, p) => sum + Math.max(0, p.count - p.drawnCount), 0);
            if (totalRemainingPrizeM <= 0) return showToast('所有禮物品項的配額皆已抽完！', 'error');
            if (!app.participants.length) return showToast('請載入名單！', 'error');

            app.grandDrawing = true;
            startRecordingStream();

            const btn = document.getElementById('draw-btn');
            const gBtn = document.getElementById('grand-draw-btn');
            btn.disabled = true;
            gBtn.disabled = true;
            
            btn.className = "w-full py-3.5 bg-slate-100 text-slate-400 font-black text-base lg:text-lg rounded-2xl cursor-not-allowed flex items-center justify-center gap-2 transition-all truncate";
            gBtn.className = "w-full py-3.5 bg-amber-500/10 border border-amber-500/20 text-amber-500 font-bold text-base lg:text-lg rounded-2xl cursor-wait flex items-center justify-center gap-2 animate-pulse truncate";
            
            document.getElementById('grand-btn-text').innerText = "⚡ 大抽選中...";

            const box = document.getElementById('marquee-box');
            box.innerHTML = '';

            const isFastMode = document.getElementById('fast-mode-check').checked;

            if (isFastMode) {
                executeGrandDrawCore();
            } else {
                const previewCard = document.createElement('div');
                previewCard.className = "marquee-card bg-slate-50 p-6 rounded-xl text-center border border-slate-200";
                box.appendChild(previewCard);
                
                let rollCount = 0;
                const rollTimer = setInterval(() => {
                    audio.playTick();
                    const p = app.participants[Math.floor(Math.random() * app.participants.length)];
                    previewCard.innerHTML = `<span class="font-black text-amber-600 text-lg tracking-wider">⚡ 正在批次大抽選中: ${mask.name(p.name)} ...</span>`;
                    rollCount++;
                    if (rollCount >= 35) {
                        clearInterval(rollTimer);
                        executeGrandDrawCore();
                    }
                }, 75);
            }
        }

        // --- 一鍵大抽選核心計算：方案 B 硬性權重優先級排序 ---
        function executeGrandDrawCore() {
            let pool = [...app.participants];
            let activePrizes = [...app.prizes].filter(p => p.count - p.drawnCount > 0);

            // 🏆 跨獎項排除過濾
            const isCrossExclude = document.getElementById('cross-exclude-check').checked;
            if (isCrossExclude && app.winners.length > 0) {
                const wonIdNums = app.winners.map(w => w.idNum).filter(Boolean);
                const wonNames = app.winners.map(w => w.name).filter(Boolean);
                pool = pool.filter(p => !wonIdNums.includes(p.idNum) && !wonNames.includes(p.name));
            }

            let allWinners = [];
            const time = new Date().toLocaleString();

            const useOptionB = document.getElementById('option-b-check').checked;

            if (useOptionB) {
                // 🔒 方案 B 核心：硬性權重排序 + 同分隨機亂數破局
                pool.forEach(p => p.rand = Math.random());
                pool.sort((a, b) => {
                    const wA = Number(a.weight) || 1;
                    const wB = Number(b.weight) || 1;
                    if (wB !== wA) return wB - wA; // 高權重絕對優先
                    return b.rand - a.rand;       // 同權重隨機破局
                });

                // 按試算表從上到下（大獎 ➔ 小獎）的優先權依序配發
                activePrizes.forEach(prize => {
                    let rQuota = prize.count - prize.drawnCount;
                    if (pool.length === 0) return;
                    
                    let prizeWinners = pool.splice(0, Math.min(rQuota, pool.length));
                    prizeWinners.forEach(w => {
                        allWinners.push({
                            ...w,
                            prizeId: prize.id,
                            prizeName: prize.name,
                            time: time
                        });
                    });
                });
            } else {
                // 備用方案 A：舊有遞減加權輪盤映射
                activePrizes.forEach(prize => {
                    let rQuota = prize.count - prize.drawnCount;
                    for (let k = 0; k < rQuota; k++) {
                        if (pool.length === 0) break;

                        const initialM = app.prizes.reduce((sum, pr) => sum + Math.max(0, pr.count - pr.drawnCount), 0);
                        const currentM = Math.max(1, initialM - allWinners.length);
                        const prizeMin = 1;
                        const prizeMax = currentM > 1 ? currentM : 2;

                        let totalWeight = 0;
                        pool.forEach(p => {
                            p.currentWeight = getRescaledWeight(p, prizeMin, prizeMax);
                            totalWeight += p.currentWeight;
                        });

                        let r = Math.random() * totalWeight;
                        for (let i = 0; i < pool.length; i++) {
                            r -= pool[i].currentWeight;
                            if (r <= 0) {
                                let winner = pool[i];
                                allWinners.push({
                                    ...winner,
                                    prizeId: prize.id,
                                    prizeName: prize.name,
                                    time: time
                                });
                                pool.splice(i, 1);
                                break;
                            }
                        }
                    }
                });
            }

            // 更新配額與紀錄
            allWinners.forEach(w => {
                app.winners.unshift(w);
                const originalPrize = app.prizes.find(p => p.id == w.prizeId);
                if (originalPrize) originalPrize.drawnCount += 1;
            });

            audio.playTada();
            saveRecords();
            renderWinners();
            syncUI();

            // 方案 A 一鍵大抽選智慧定格翻頁計時
            const itemsPerPage = (allWinners.length >= 30) ? 10 : 5;
            const totalPages = Math.ceil(allWinners.length / itemsPerPage);
            const totalDelaySeconds = (((totalPages * 3000) + 1500) / 1000).toFixed(1);

            const gBtn = document.getElementById('grand-draw-btn');
            gBtn.className = "w-full py-3.5 bg-amber-500/10 border border-amber-500/20 text-amber-500 font-bold text-xs lg:text-sm rounded-2xl flex items-center justify-center gap-2 truncate";
            document.getElementById('grand-btn-text').innerText = `錄製中 (${totalDelaySeconds}秒)...`;

            startPaginationRender(allWinners, true, () => {
                restoreButtons();
                app.grandDrawing = false;
                if (app.mediaRecorder && app.mediaRecorder.state !== 'inactive') {
                    showToast('正在生成與壓縮中獎錄影檔...', 'info');
                    app.mediaRecorder.onstop = async () => {
                        const blob = new Blob(app.recordedChunks, { type: 'video/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const base64data = reader.result.split(',')[1];
                            uploadAndRecord(allWinners, time, base64data, true);
                        };
                    };
                    app.mediaRecorder.stop();
                } else {
                    uploadAndRecord(allWinners, time, null, true);
                }
            });
        }

        // --- 還原控制按鈕 ---
        function restoreButtons() {
            const btn = document.getElementById('draw-btn');
            const gBtn = document.getElementById('grand-draw-btn');
            btn.disabled = false;
            gBtn.disabled = false;
            
            btn.className = "w-full py-3.5 bg-gradient-to-r from-brand-600 to-brand-800 hover:from-brand-500 hover:to-brand-700 text-white font-black text-base lg:text-lg rounded-2xl shadow-lg shadow-brand-900/15 transition-all flex items-center justify-center gap-2 group truncate";
            gBtn.className = "w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-black text-base lg:text-lg rounded-2xl shadow-md shadow-amber-600/10 transition-all flex items-center justify-center gap-2 group truncate";
            
            document.getElementById('btn-text').innerText = "開始抽獎";
            document.getElementById('grand-btn-text').innerText = "⚡ 一鍵大抽選";
        }

        // --- 篩選符合條件的中獎者 ---
        function pickWinners(count, prize) {
            let pool = [...app.participants];
            
            // 跨獎項歷史排除
            const isCrossExclude = document.getElementById('cross-exclude-check').checked;
            if (isCrossExclude && app.winners.length > 0) {
                const wonIdNums = app.winners.map(w => w.idNum).filter(Boolean);
                const wonNames = app.winners.map(w => w.name).filter(Boolean);
                pool = pool.filter(p => !wonIdNums.includes(p.idNum) && !wonNames.includes(p.name));
            }

            // 本輪重複過濾 (✅ 智慧降維：防堵發票號碼空白時的重複得獎漏洞)
            if(document.getElementById('dup-check').checked) {
                pool = pool.filter(p => {
                    // 如果參賽者有填寫發票號碼，進行發票號碼比對
                    if (p.invoice && p.invoice.toString().trim() !== "") {
                        const wonInvoices = app.winners.map(w => w.invoice).filter(Boolean);
                        return !wonInvoices.includes(p.invoice);
                    }
                    
                    // 如果發票號碼為空白，則智慧降維改用「身分證」與「姓名」作為防重複判定
                    const isWonBefore = app.winners.some(w => 
                        (p.idNum && w.idNum === p.idNum) || 
                        (p.name && w.name === p.name)
                    );
                    return !isWonBefore;
                });
            }

            if(pool.length === 0) return [];

            const useOptionB = document.getElementById('option-b-check').checked;

            if (useOptionB) {
                // 🔒 方案 B 核心：硬性權重排序 + 同分隨機亂數破局法
                pool.forEach(p => p.rand = Math.random());
                pool.sort((a, b) => {
                    const wA = Number(a.weight) || 1;
                    const wB = Number(b.weight) || 1;
                    if (wB !== wA) return wB - wA;
                    return b.rand - a.rand;
                });
                return pool.slice(0, Math.min(count, pool.length));
            } else {
                // 備用方案 A：加權隨機輪盤機率映射
                const currentM = app.prizes.reduce((sum, pr) => sum + Math.max(0, pr.count - pr.drawnCount), 0);
                const prizeMin = 1;
                const prizeMax = currentM > 1 ? currentM : 2;

                let res = [];
                const drawSize = Math.min(count, pool.length);
                for(let i=0; i<drawSize; i++) {
                    let total = 0;
                    pool.forEach(p => {
                        p.currentWeight = getRescaledWeight(p, prizeMin, prizeMax);
                        total += p.currentWeight;
                    });

                    let r = Math.random() * total;
                    for(let j=0; j<pool.length; j++) {
                        r -= pool[j].currentWeight;
                        if(r <= 0) { 
                            res.push(pool[j]); 
                            pool.splice(j, 1); 
                            break; 
                        }
                    }
                }
                return res;
            }
        }

        function saveRecords() { localStorage.setItem('aurora_v2_winners', JSON.stringify(app.winners)); }

        // --- 歷史紀錄渲染 ---
        function renderWinners() {
            const list = document.getElementById('win-log');
            document.getElementById('win-cnt').innerText = app.winners.length;
            list.innerHTML = app.winners.map(w => {
                const hasInvoiceVal = w.invoice && w.invoice.trim() !== "";
                return `
                    <div class="bg-slate-50 border border-slate-200 p-3.5 rounded-2xl flex flex-col gap-1.5 hover:border-brand-500/40 transition-all text-xs font-bold shadow-sm">
                        <div class="flex justify-between items-center border-b border-slate-200 pb-1.5 mb-1">
                            <span class="text-[9px] font-black text-brand-600 uppercase tracking-wider">${w.prizeName}</span>
                            <span class="text-[8px] text-slate-500 font-mono">${w.time.split(' ')[1]}</span>
                        </div>
                        <div class="grid grid-cols-12 gap-1 items-center text-slate-700">
                            <span class="col-span-5 text-slate-800 truncate">${mask.name(w.name)}</span>
                            <span class="col-span-4 text-center font-mono text-slate-500 text-[10px] truncate">${mask.id(w.idNum)}</span>
                            <span class="col-span-3 text-right font-mono text-brand-600 truncate text-[10px]">${hasInvoiceVal ? w.invoice : '無資料'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 清空與重置 ---
        function clearAll() { document.getElementById('confirm-clear-modal').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('confirm-clear-modal').classList.add('hidden'); }

        function executeClear() {
            app.winners = [];
            saveRecords();
            renderWinners();
            if(app.gasUrl) {
                const cleanUrl = getCleanUrl(app.gasUrl);
                fetch(`${cleanUrl}?action=clearWinners`, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({})
                });
            }
            if (app.prizes) {
                app.prizes.forEach(p => p.drawnCount = 0);
                updatePrizeUI();
            }
            closeConfirmModal();
            
            showToast('所有紀錄已成功清空，網頁即將自動重新整理...', 'success');
            setTimeout(() => {
                location.reload();
            }, 1500);
        }

        function getCleanUrl(url) {
            let clean = url.trim();
            if (clean.includes('?')) {
                clean = clean.split('?')[0];
            }
            return clean;
        }

        function uploadAndRecord(winners, time, videoBase64, isGrandDraw) {
            if(app.gasUrl) {
                const cleanUrl = getCleanUrl(app.gasUrl);
                fetch(`${cleanUrl}?action=recordWinners`, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        prizeId: isGrandDraw ? null : app.prize.id, 
                        prizeName: isGrandDraw ? "一鍵大抽選" : app.prize.name,
                        isGrandDraw: isGrandDraw,
                        winners: winners.map(w => ({ ...w, time })),
                        videoBase64: videoBase64 
                    })
                }).then(() => {
                    showToast('數據已自動上傳並更新雲端試算表！', 'success');
                });
            }
        }
    </script>
